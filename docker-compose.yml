###############################################
# Common Keys for all apps
###############################################

x-common-keys: &common-keys
  restart: unless-stopped
  logging:
    driver: json-file
  environment:
    PUID: ${PUID:-1000}
    PGID: ${PGID:-1000}
    TZ: ${TZ:-Europe/Paris}
  dns:
    - 1.1.1.1
    - 1.0.0.1

services:
###############################################
# RADARR - Movies
###############################################
  radarr:
    <<: *common-keys
    container_name: radarr
    image: ghcr.io/hotio/radarr:latest
    ports:
      - 7878:7878
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/radarr:/config
      - ${DATA_ROOT:-/data}:/data

###############################################
# SONARR - TV Shows
###############################################
  sonarr:
    <<: *common-keys
    container_name: sonarr
    image: ghcr.io/hotio/sonarr:latest
    ports:
      - 8989:8989
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/sonarr:/config
      - ${DATA_ROOT:-/data}:/data

###############################################
# LIDARR - Music
###############################################
  lidarr:
    <<: *common-keys
    container_name: lidarr
    image: ghcr.io/hotio/lidarr:latest
    ports:
      - 8686:8686
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/lidarr:/config
      - ${DATA_ROOT:-/data}:/data

###############################################
# BAZARR - Subtitles
###############################################
  bazarr:
    <<: *common-keys
    container_name: bazarr
    image: ghcr.io/hotio/bazarr:latest
    ports:
      - 6767:6767
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/bazarr:/config
      - ${DATA_ROOT:-/data}/media:/data/media

###############################################
# PROWLARR - Indexer Manager
###############################################
  prowlarr:
    <<: *common-keys
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr:latest
    ports:
      - 9696:9696
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/prowlarr:/config

###############################################
# QBITTORRENT - Downloader
###############################################
  qbittorrent:
    <<: *common-keys
    container_name: qbittorrent
    image: ghcr.io/hotio/qbittorrent:latest
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Paris}
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/qbittorrent:/config
      - ${DATA_ROOT:-/data}:/data

###############################################
# JELLYFIN - Media Server
###############################################
  jellyfin:
    <<: *common-keys
    container_name: jellyfin
    image: ghcr.io/hotio/jellyfin:latest
    ports:
      - 8096:8096
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/jellyfin:/config
      - ${DATA_ROOT:-/data}/media:/data/media:ro
    devices:
      - /dev/dri:/dev/dri

###############################################
# SYNCTHING - Personal files / phone sync
###############################################
  syncthing:
    <<: *common-keys
    container_name: syncthing
    image: syncthing/syncthing:latest
    hostname: lenovo-syncthing
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPDATA_ROOT:-/docker/appdata}/syncthing:/var/syncthing
      - ${DATA_ROOT:-/data}/personal:/data/personal

###############################################
# ARR Stack Dedicated Network
###############################################
networks:
  default:
    name: arr_network
